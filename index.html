
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Categories</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h2>Online Quiz System</h2>
    <button onclick="logout()">Logout</button>
</header>

<div class="container">
    <h2>Welcome!</h2>
    <p>Select a quiz category to begin.</p>

    <div class="category">
        <button onclick="startQuiz('gk')">General Knowledge</button>
        <button onclick="startQuiz('html')">HTML</button>
        <button onclick="startQuiz('css')">CSS</button>
        <button onclick="startQuiz('javascript')">JavaScript</button>
    </div>
</div>

<script>
    if (localStorage.getItem("login") !== "true") {
        window.location.href = "index.html";
    }

    function startQuiz(category) {
        localStorage.setItem("category", category);
        window.location.href = "quiz.html";
    }

    function logout() {
        localStorage.removeItem("login");
        localStorage.removeItem("category");
        window.location.href = "index.html";
    }
</script>

</body>
</html>
